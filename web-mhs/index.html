<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web MicroHs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
    body, html {
        margin: 0; padding: 0; height: 100%; width: 100%;
        background-color: #1a1a1a; color: white;
        display: flex; flex-direction: column; overflow: hidden;
    }

    #header {
        text-align: center; font-family: sans-serif; font-size: 2.5rem;
        padding: 20px 0 10px 0; flex-shrink: 0;
    }

    /* The new Flex container for side-by-side layout */
    #main-content {
        display: flex;
        flex-grow: 1;
        margin: 0 20px 30px 20px;
        gap: 20px; /* Space between terminal and canvas */
    }

    #terminal-container {
        flex: 1; /* Takes up 50% of the space */
        background-color: black;
        position: relative;
        border-radius: 8px;
        overflow: hidden;
    }

    #terminal {
        position: absolute; top: 10px; bottom: 10px; left: 10px; right: 10px;
    }

    #canvas-container {
        display: none;
        flex: 1;
        background-color: #e0e0e0;
        border-radius: 8px;
        position: relative;
        overflow: hidden;
    }

    /* Canvas must absolutely fill its container */
    #drawing-canvas {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }

    /* Responsive layout for vertical/narrow screens */
    @media (max-width: 800px), (orientation: portrait) {
        #main-content {
            flex-direction: column;
        }

        #terminal-container, #canvas-container {
            /* Ensures they each get 50% of the vertical space */
            min-height: 300px;
        }
    }

    #close-canvas-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10; /* Ensures it sits on top of the drawing */
        background-color: rgba(0, 0, 0, 0.2);
        color: white;
        border: none;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    #close-canvas-btn:hover {
        background-color: rgba(0, 0, 0, 0.6);
    }

</style>

</head>
<body>

    <div id="header">
      Welcome to MicroHs in the Browser
      <div class="button-row">
        <button id="mount-btn">📁 Select Local Workspace</button>
        <button id="download-url-btn">🌐 Download from GitHub</button>
      </div>
    </div>

    <div id="main-content">
      <div id="terminal-container">
        <div id="terminal"></div>
      </div>

      <div id="canvas-container">
        <button id="close-canvas-btn" onclick="hideCanvas()">✕</button>

        <div style="font-family: monospace; position: absolute; visibility: hidden;">Preload</div>
        <canvas id="drawing-canvas"></canvas>
      </div>

    <script>

      const mhsi_rc_text = `
import System.Directory
cat :: FilePath -> IO ()
cat f = readFile f >>= putStrLn
ls :: FilePath -> IO ()
ls d = listDirectory d >>= putStrLn . unlines
cd :: FilePath -> IO ()
cd d = setCurrentDirectory d
putStrLn ""
putStrLn "*** MicroHs Web Playground ***"
putStrLn "Use ':defs' to see definitions."
putStrLn "Do 'cat \\"line_edit\\"' to see editing commands."
putStrLn "Try 'import Graphics.CanvHs.Demo' and then try demo1-demo5."
putStrLn "To access local files, use the button above to select a directory."
putStrLn ""`
      const line_edit_text = `
Line editing keys (Emacs inspired):
CTL-B         move backards
CTL-F         move forwards
CTL-A         move to beginning of line
CTL-E         move to end of line
CTL-H         backspace
DEL           backspace
ENTER         send line
CTL-N         next in history
CTL-P         previous in history
CTL-U         erase line
CTL-K         kill to end of line
TAB           complete word
Arrow key     like CTL-B, CTL-F, CTL-P, CTL-N
`

        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        window.ctx = ctx;
        window.mouseState = { x: 0.0, y: 0.0, down: false };

        window.onload = function() {
            const term = new Terminal({
                cursorBlink: true,
                rightClickSelectsWord: true,
                fontFamily: 'monospace',
                fontSize: 16,
                theme: {
                    background: '#000000',
                    red: '#ff5555',
                    green: '#50fa7b',
                    yellow: '#f1fa8c',
                    blue: '#bd93f9',
                    cyan: '#8be9fd',
                    foreground: '#ffffff'
                }
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal'));
            fitAddon.fit();

            window.Module = {
                preRun: [function() {
                    // Initialize Standard I/O
                    Module.FS.init(
                        () => null,
                        (asciiCode) => {
                            if (asciiCode !== null) {
                                if (asciiCode === 10) {
                                    term.write('\r\n');
                                } else {
                                    term.write(String.fromCharCode(asciiCode));
                                }
                            }
                        },
                        (asciiCode) => {
                            if (asciiCode !== null) term.write(String.fromCharCode(asciiCode));
                        }
                    );

                    Module.FS.mkdir('/upload');
                    Module.FS.chdir('/upload');

                    Module.FS.writeFile(".mhsi_rc", mhsi_rc_text);
                    Module.FS.writeFile("line_edit", line_edit_text);

                }],
                print: () => {},
                printErr: (text) => term.writeln("ERR: " + text)
            };


            // Track our linked files for the auto-sync loop
            const fileRegistry = {};

            // Helper to safely create directories in Wasm without crashing if they exist
            function safeMkdir(path) {
                try {
                    Module.FS.mkdirTree(path); // mkdirTree creates parent folders automatically
                } catch (e) {
                    // Ignore errors (usually means the directory already exists)
                }
            }

            // Recursive function to walk the local folder and mirror it into Wasm
            async function mountDirectory(dirHandle, currentWasmPath) {
                safeMkdir(currentWasmPath);

                // Loop through every file and folder inside this directory handle
                for await (const entry of dirHandle.values()) {
                    const fullWasmPath = `${currentWasmPath}/${entry.name}`;

                    if (entry.kind === 'file') {
                        // It's a file: read it and write to Wasm memory
                        const fileHandle = await dirHandle.getFileHandle(entry.name);
                        const file = await fileHandle.getFile();
                        const data = new Uint8Array(await file.arrayBuffer());

                        Module.FS.writeFile(fullWasmPath, data);

                        // Add to registry so the background loop keeps it updated
                        fileRegistry[fullWasmPath] = { handle: fileHandle, lastModified: file.lastModified };
                        console.log(`Mounted: ${fullWasmPath}`);

                    } else if (entry.kind === 'directory') {
                        // It's a folder: recursively process it
                        const subDirHandle = await dirHandle.getDirectoryHandle(entry.name);
                        await mountDirectory(subDirHandle, fullWasmPath);
                    }
                }
            }

            // The Button Click Event
            document.getElementById('mount-btn').addEventListener('click', async () => {
                try {
                    // 1. Ask the user to pick a folder
                    const rootDirHandle = await window.showDirectoryPicker();

                    term.writeln(`\r\n\x1b[32m[System]\x1b[0m Indexing directory... This may take a moment.`);

                    // 2. Recursively mount everything under /upload
                    await mountDirectory(rootDirHandle, '/upload');

                    term.writeln(`\r\n\x1b[32m[System]\x1b[0m Workspace mounted successfully at .`);

                    // 3. Start the background sync loop for edits
                    if (!window.syncInterval) {
                        window.syncInterval = setInterval(pollFiles, 500);
                    }
                } catch (err) {
                    console.error("Directory picker cancelled or failed", err);
                    term.writeln(`\r\n\x1b[31m[System]\x1b[0m Failed to mount workspace.`);
                }
            });

            document.getElementById('download-url-btn').addEventListener('click', async () => {
                // Prefill with your repo URL
                const defaultUrl = "https://github.com/augustss/canvhs/tree/main/";
                const rawUrl = prompt("Enter GitHub Folder URL:", defaultUrl);
                if (!rawUrl) return;

                try {
                    // Regex to extract user, repo, branch, and path
                    const urlMatch = rawUrl.match(/github\.com\/([^/]+)\/([^/]+)\/tree\/([^/]+)\/?(.*)/);
                    if (!urlMatch) throw new Error("Invalid format. Use: github.com/user/repo/tree/branch/path");

                    const [_, user, repo, branch, targetPath] = urlMatch;

                    // Use the Recursive Trees API
                    const apiUrl = `https://api.github.com/repos/${user}/${repo}/git/trees/${branch}?recursive=1`;

                    term.writeln(`\x1b[36mScanning ${user}/${repo} (${branch})...\x1b[0m`);
                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    if (!data.tree) throw new Error("Could not find repository tree. Check branch name.");

                    // Filter: if targetPath is empty, get everything. Otherwise, filter by path.
                    const itemsToDownload = data.tree.filter(item =>
                        targetPath === "" || item.path.startsWith(targetPath)
                    );

                    for (const item of itemsToDownload) {
                        // Clean up the path so it saves correctly in /upload
                        let relativePath = item.path;
                        if (targetPath !== "") {
                            relativePath = item.path.replace(targetPath, "").replace(/^\//, "");
                        }
                        if (!relativePath) continue;

                        if (item.type === 'tree') {
                            try {
                                Module.FS.mkdirTree(relativePath); // mkdirTree handles nested parents!
                                term.writeln(`  Created dir: ${relativePath}`);
                            } catch(e) {}
                        } else if (item.type === 'blob') {
                            term.writeln(`  Fetching: ${relativePath}`);
                            const downloadUrl = `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${item.path}`;
                            const fileRes = await fetch(downloadUrl);

                            if (fileRes.ok) {
                                const blob = await fileRes.arrayBuffer();
                                // Ensure the parent directory exists before writing
                                const dirPath = relativePath.substring(0, relativePath.lastIndexOf('/'));
                                if (dirPath) try { Module.FS.mkdirTree(dirPath); } catch(e) {}

                                Module.FS.writeFile(relativePath, new Uint8Array(blob));
                            }
                        }
                    }
                    term.writeln(`\x1b[32mDownload Complete!\x1b[0m`);

                } catch (error) {
                    term.writeln(`\x1b[31mError: ${error.message}\x1b[0m`);
                }
            });


            // The polling function remains exactly the same!
            async function pollFiles() {
                for (const [path, entry] of Object.entries(fileRegistry)) {
                    try {
                        const file = await entry.handle.getFile();
                        if (file.lastModified > entry.lastModified) {
                            const data = new Uint8Array(await file.arrayBuffer());
                            Module.FS.writeFile(path, data);
                            entry.lastModified = file.lastModified;
                            console.log(`Auto-synced updated file: ${path}`);
                        }
                    } catch (e) {
                        // Ignore (file might be locked by OS momentarily)
                    }
                }
            }

            term.onData(data => {
                for (let i = 0; i < data.length; i++) {
                    const code = data.charCodeAt(i);
                    if (window.Module && window.Module._set_input_char) {
                        window.Module._set_input_char(code);
                    }
                }
            });

            term.onSelectionChange(() => {
                if (term.hasSelection()) {
                    const selectedText = term.getSelection();
                    navigator.clipboard.writeText(selectedText);
                }
            });

            window.addEventListener('resize', () => {
                fitAddon.fit();
            });

            const script = document.createElement('script');
            script.src = 'mhs-embed.js';
            document.body.appendChild(script);


            // Function to make sure the canvas internal resolution matches the screen size
            function resizeCanvas() {
                const canvas = document.getElementById('drawing-canvas');
                const container = document.getElementById('canvas-container');
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
            }

            // Call it once on startup
            resizeCanvas();

            // Update both the terminal and the canvas when the window resizes
            window.addEventListener('resize', () => {
                fitAddon.fit();
                resizeCanvas();
            });

            // Function to unhide the canvas and fix the layout
            window.showCanvas = function() {
                const container = document.getElementById('canvas-container');
                if (container.style.display !== 'block') {
                    container.style.display = 'block'; // Unhide it

                    // Force the canvas to figure out its new pixel dimensions
                    resizeCanvas();

                    // Tell the terminal to recalculate its rows/cols so text doesn't overflow
                    if (typeof fitAddon !== 'undefined') {
                        fitAddon.fit();
                    }
                }
            };

            window.hideCanvas = function() {
                const container = document.getElementById('canvas-container');
                container.style.display = 'none';

                // Tell the terminal to expand and fill the newly freed space
                if (typeof fitAddon !== 'undefined') {
                    fitAddon.fit();
                }
            };

function updateMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const rawX = e.clientX - rect.left;
    const rawY = e.clientY - rect.top;
    
    // Translate to center-origin and flip Y axis
    window.mouseState.x = rawX - (rect.width / 2);
    window.mouseState.y = (rect.height / 2) - rawY; 
}

canvas.addEventListener('mousemove', updateMousePos);

canvas.addEventListener('mousedown', (e) => {
    updateMousePos(e);
    window.mouseState.down = true;
});

canvas.addEventListener('mouseup', (e) => {
    updateMousePos(e);
    window.mouseState.down = false;
});


window.drawHaskellText = function(textPtr) {
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    const str = UTF8ToString(textPtr);
    
    // 1. Read the absolute screen coordinates calculated by Haskell's 'Translate'
    const matrix = ctx.getTransform();
    
    ctx.save();
    
    // 2. Erase all scaling, flipping, and rotating to jump back to perfect Screen Space
    ctx.resetTransform(); 
    
    // 3. Only set the font if it's different (Prevents Glyph Cache Trashing)
    if (ctx.font !== '24px monospace') {
        ctx.font = '24px monospace';
    }
    ctx.textBaseline = 'middle';
    
    // 4. Snap the absolute screen coordinates to exact integers
    const screenX = Math.round(matrix.e);
    const screenY = Math.round(matrix.f);
    
    // 5. Draw the text right-side up, perfectly pixel-aligned
    ctx.fillText(str, screenX, screenY);
    
    ctx.restore();
};

        };

    </script>
</body>
</html>
