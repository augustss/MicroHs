<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MicroHs + pixi.js</title>
  <style>
    body { margin: 0; background: #0b0b16; color: #e8e8f0; font-family: monospace; }
    #log { padding: 10px; white-space: pre-wrap; }
    #stage { display: flex; justify-content: center; padding: 12px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
  <script src="mhseval-web.js"></script>
</head>
<body>
  <div id="log">loading…</div>
  <div id="stage"></div>
  <script>
  (async () => {
    const logEl = document.getElementById('log');
    const log = (m) => { logEl.textContent = m; console.log(m); };
    try {
      // 1. Create the pixi.js application (v7 API is synchronous).
      const app = new PIXI.Application({ width: 480, height: 360, background: 0x111133, antialias: true });
      document.getElementById('stage').appendChild(app.view);
      globalThis.__pixiApp = app;
      globalThis.pixiObjs = [];       // userland object-handle registry for the program

      // 2. Fetch the combinator program compiled by MicroHs (host-side gmhs, for now).
      //    Load as BINARY: the .comb contains raw bytes (byte-string literals), so
      //    decoding it as text would corrupt it.
      const combBuf = new Uint8Array(await (await fetch('PixiDemo.comb')).arrayBuffer());

      // 3. Instantiate the MicroHs WASM runtime (do not auto-run main).
      const Module = await MhsEval({
        noInitialRun: true,
        print:    (t) => console.log('[mhs] ' + t),
        printErr: (t) => console.error('[mhs] ' + t),
      });

      // 4. Load the program into the FS and run it. The program uses
      //    `foreign import javascript` to drive pixi.js via the dynamic FFI bridge.
      Module.FS.writeFile('/prog.comb', combBuf);
      Module.callMain(['+RTS', '-r/prog.comb', '-RTS']);

      log('MicroHs ran. The spinning box was created and is animated from Haskell.');
      globalThis.__ready = true;
    } catch (e) {
      log('ERROR: ' + (e && e.stack || e));
      globalThis.__error = String(e);
    }
  })();
  </script>
</body>
</html>
